services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./apps/backend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/stellchat
      - STELLCHAT_ENV=development
      - STELLCHAT_API_URL=http://localhost:3000
    command: npm run start:dev
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - stellchat_dev_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes", "--notify-keyspace-events", "Ex" ]
    volumes:
      - redis_dev_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stellchat_dev_net

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=stellchat
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d stellchat" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stellchat_dev_net

networks:
  stellchat_dev_net:
    driver: bridge

volumes:
  postgres_dev_data:
  redis_dev_data:
