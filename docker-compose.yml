services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/stellchat}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-stellchat}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-minioadmin}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-minioadmin}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-minioadmin}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-stellchat-media}
      - R2_ENDPOINT=${R2_ENDPOINT:-http://minio:9000}
      - R2_PUBLIC_ENDPOINT=${R2_PUBLIC_ENDPOINT:-http://localhost:9000}
    command: npm run start:dev
    depends_on:
      - redis
      - postgres
      - minio
    networks:
      - stellchat_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes", "--notify-keyspace-events", "Ex" ]
    networks:
      - stellchat_net

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=stellchat
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stellchat_net

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stellchat_net

  # Sidecar to create the bucket
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; /usr/bin/mc mb --ignore-existing local/stellchat-media; /usr/bin/mc anonymous set public local/stellchat-media; exit 0; "
    networks:
      - stellchat_net

networks:
  stellchat_net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
