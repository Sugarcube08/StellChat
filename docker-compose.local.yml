services:
  postgres:
    image: postgres:15-alpine
    container_name: stellchat-postgres-local
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=stellchat
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d stellchat" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stellchat_local_net

  redis:
    image: redis:7-alpine
    container_name: stellchat-redis-local
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes", "--notify-keyspace-events", "Ex" ]
    volumes:
      - redis_local_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stellchat_local_net

  stellar-quickstart:
    image: stellar/quickstart:latest
    container_name: stellchat-stellar-local
    ports:
      - "8000:8000"
    command: /start --standalone --enable-soroban-rpc
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stellchat_local_net

  prover:
    build:
      context: ./apps/prover
      dockerfile: Dockerfile
    container_name: stellchat-prover-local
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - WASM_PATH=/app/zk/build/payment_hasher_js/payment_hasher.wasm
      - ZKEY_PATH=/app/zk/build/payment_hasher_final.zkey
    volumes:
      - ./zk:/app/zk
    restart: unless-stopped
    networks:
      - stellchat_local_net

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: stellchat-backend-local
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/stellchat
      - STELLCHAT_ENV=development
      - STELLCHAT_API_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      stellar-quickstart:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stellchat_local_net

networks:
  stellchat_local_net:
    driver: bridge

volumes:
  postgres_local_data:
  redis_local_data:
